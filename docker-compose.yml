services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=streaming
      - RABBITMQ_DEFAULT_PASS=streaming
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streaming-net

  catalogo-service:
    build: ./catalogo-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    networks:
      - streaming-net

  reproducao-service:
    build: ./reproducao-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - CATALOGO_URL=http://catalogo-service:8081
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=streaming
      - SPRING_RABBITMQ_PASSWORD=streaming
    depends_on:
      rabbitmq:
        condition: service_healthy
      catalogo-service:
        condition: service_started
    networks:
      - streaming-net

  telemetria-service:
    build: ./telemetria-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=streaming
      - SPRING_RABBITMQ_PASSWORD=streaming
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - streaming-net

  historico-service:
    build: ./historico-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=streaming
      - SPRING_RABBITMQ_PASSWORD=streaming
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - streaming-net

networks:
  streaming-net:
    driver: bridge
