version: '3.8'

services:
  catalogo-service:
    build: ./catalogo-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    networks:
      - streaming-net

  reproducao-service:
    build: ./reproducao-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - CATALOGO_URL=http://catalogo-service:8081
      - TELEMETRIA_URL=http://telemetria-service:8083
      - HISTORICO_URL=http://historico-service:8084
    depends_on:
      - catalogo-service
      - telemetria-service
      - historico-service
    networks:
      - streaming-net

  telemetria-service:
    build: ./telemetria-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
    networks:
      - streaming-net

  historico-service:
    build: ./historico-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
    networks:
      - streaming-net

networks:
  streaming-net:
    driver: bridge
